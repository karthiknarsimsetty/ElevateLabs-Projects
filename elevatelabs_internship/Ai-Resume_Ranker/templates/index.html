<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Resume Ranker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-lg">

                <div class="card-header text-center text-white">

                    <h1>
                        <i class="bi bi-file-earmark-person-fill"></i>
                        AI Resume Ranker
                    </h1>

                    <p class="mb-0">
                        Upload resumes and compare them with a Job Description using NLP
                    </p>

                </div>

                <div class="card-body">

                    <form action="/rank" method="POST" enctype="multipart/form-data">

                        <div class="mb-4">

                            <label class="form-label">

                                <i class="bi bi-file-earmark-pdf-fill text-danger"></i>

                                Upload Resume PDFs

                            </label>

                            <input
                                type="file"
                                class="form-control"
                                name="resumes"
                                multiple
                                accept=".pdf"
                                required>

                            <small class="text-light">
                                Upload one or more PDF resumes.
                            </small>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                <i class="bi bi-briefcase-fill text-warning"></i>

                                Job Description

                            </label>

                            <textarea
                                class="form-control"
                                name="job_description"
                                rows="12"
                                placeholder="Paste the Job Description here..."
                                required></textarea>

                        </div>

                        <div class="d-grid">

                            <button class="btn btn-primary btn-lg">

                                <i class="bi bi-bar-chart-fill"></i>

                                Rank Resumes

                            </button>

                        </div>

                    </form>

                </div>

                <div class="card-footer text-center text-light">

                    <small>

                        AI Resume Ranker |
                        Flask • SpaCy • TF-IDF • Cosine Similarity • Scikit-Learn

                    </small>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
